<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Happy Birthday</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

  :root {
    --bg: #1a1c2c;
    --bg2: #29366f;
    --path: #3b5dc9;
    --accent: #ffcd75;
    --accent2: #ff6b6b;
    --c1: #ffcd75;
    --c2: #ff6b6b;
    --c3: #38b764;
    --c4: #3b9dc9;
    --c5: #b565e0;
    --c6: #ff9de0;
    --leaf: #38b764;
    --card: #f4f4f4;
    --ink: #1a1c2c;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, #29366f 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #29366f 0%, transparent 40%);
    font-family: 'VT323', monospace;
    color: var(--card);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  h1 {
    font-family: 'Press Start 2P', cursive;
    text-align: center;
    font-size: clamp(14px, 5vw, 20px);
    padding: clamp(15px, 4vw, 30px) 10px clamp(5px, 2vw, 10px);
    color: var(--accent);
    text-shadow: 3px 3px 0 var(--accent2);
    letter-spacing: 1px;
  }

  .sub {
    text-align: center;
    font-size: clamp(12px, 3.5vw, 20px);
    color: #a8b5e0;
    margin-bottom: 10px;
  }

  .progress-wrap {
    max-width: 300px;
    margin: 0 auto 30px;
    text-align: center;
    padding: 0 15px;
  }

  .progress-bar {
    height: 14px;
    background: var(--bg2);
    border: 3px solid var(--card);
    margin-top: 6px;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--leaf);
    transition: width 0.3s ease;
  }

  .progress-label {
    font-size: clamp(12px, 3vw, 16px);
    color: #a8b5e0;
  }

  .map {
    position: relative;
    width: 90%;
    max-width: 700px;
    margin: 0 auto 60px;
    padding: 10px 0 40px;
    aspect-ratio: 1 / 0.85;
  }

  .path-svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: visible;
  }

  .path-svg path {
    fill: none;
    stroke: var(--path);
    stroke-width: 4;
    stroke-linecap: round;
    stroke-dasharray: 2 14;
  }

  .walker-figure {
    position: absolute;
    top: 0;
    left: 0;
    width: clamp(40px, 10vw, 60px);
    height: clamp(80px, 20vw, 120px);
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAABwgAAAFoCAYAAABDt6/mAAEAAElEQVR4nOz9ebws2XXXiX7X2jsi8wx3qLqlqpJKUsmSLJVVkoUt2ZZlbCwbGxsMNjRmMDTw6HY3/RjaPOhuM70egIamTdPd0A==');
    background-repeat: no-repeat;
    background-size: 100% 100%;
    background-position: 0 0;
    image-rendering: pixelated;
    offset-rotate: 0deg;
    offset-anchor: 50% 100%;
    offset-distance: 0%;
    transform-origin: 50% 100%;
    z-index: 4;
    pointer-events: none;
  }

  .walker-figure.facing-left {
    transform: scaleX(-1);
  }

  .retro-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }

  .pixel-stars {
    position: absolute;
    top: -100px;
    left: -100px;
    right: -100px;
    bottom: -100px;
    background-image: 
      radial-gradient(2px 2px at 40px 60px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 20px 50px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
      radial-gradient(2px 2px at 30px 100px, rgba(255,255,255,0.6), rgba(0,0,0,0)),
      radial-gradient(2px 2px at 80px 40px, rgba(255,255,255,0.9), rgba(0,0,0,0)),
      radial-gradient(2px 2px at 120px 130px, #fff, rgba(0,0,0,0)),
      radial-gradient(2px 2px at 90px 10px, rgba(255,255,255,0.7), rgba(0,0,0,0));
    background-size: 150px 150px;
    animation: driftStars 60s linear infinite, starTwinkle 4s steps(3, end) infinite alternate;
    opacity: 0.35;
  }

  @keyframes driftStars {
    from { transform: translateY(0); }
    to { transform: translateY(150px); }
  }

  @keyframes starTwinkle {
    0% { opacity: 0.2; }
    50% { opacity: 0.4; }
    100% { opacity: 0.2; }
  }

  .pixel-cloud {
    width: 20px; height: 20px;
    background: rgba(255, 255, 255, 0.8);
    box-shadow: 
      20px 0 0 rgba(255, 255, 255, 0.8),
      40px 0 0 rgba(255, 255, 255, 0.8),
      60px 0 0 rgba(255, 255, 255, 0.8),
      80px 0 0 rgba(255, 255, 255, 0.8),
      20px -20px 0 rgba(255, 255, 255, 0.8),
      40px -20px 0 rgba(255, 255, 255, 0.8),
      60px -20px 0 rgba(255, 255, 255, 0.8),
      40px -40px 0 rgba(255, 255, 255, 0.8);
    opacity: 0.3;
    position: absolute;
    animation: driftCloud 80s linear infinite;
  }

  .c1 { top: 15%; animation-duration: 90s; animation-delay: -10s; }
  .c2 { top: 45%; animation-duration: 75s; animation-delay: -40s; }
  .c3 { top: 75%; animation-duration: 100s; animation-delay: -70s; }

  @keyframes driftCloud {
    from { transform: translateX(-200px); }
    to { transform: translateX(120vw); }
  }

  .node {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: clamp(10px, 3vw, 20px);
    margin-bottom: clamp(30px, 7vw, 46px);
    padding: 0 15px;
    width: 100%;
  }

  .node:nth-child(even) { flex-direction: row-reverse; }

  .chest {
    flex-shrink: 0;
    width: clamp(50px, 12vw, 60px);
    height: clamp(50px, 12vw, 60px);
    background: var(--accent);
    border: 3px solid var(--ink);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(18px, 5vw, 26px);
    transition: transform 0.15s;
    position: relative;
    z-index: 2;
  }

  .chest:hover { transform: scale(1.1) rotate(-3deg); }
  .chest:active { transform: scale(0.95); }

  .node:nth-child(6n+1) .chest { background: var(--c1); }
  .node:nth-child(6n+2) .chest { background: var(--c2); }
  .node:nth-child(6n+3) .chest { background: var(--c3); }
  .node:nth-child(6n+4) .chest { background: var(--c4); }
  .node:nth-child(6n+5) .chest { background: var(--c5); }
  .node:nth-child(6n+6) .chest { background: var(--c6); }

  .chest.opened {
    background: var(--leaf) !important;
  }

  .chest .num {
    position: absolute;
    top: -8px;
    left: -8px;
    background: var(--ink);
    color: var(--accent);
    font-family: 'Press Start 2P', cursive;
    font-size: 8px;
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--card);
  }

  .label {
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(8px, 2.5vw, 10px);
    color: var(--card);
    background: var(--bg2);
    border: 3px solid var(--ink);
    padding: 8px 12px;
    box-shadow: 3px 3px 0 rgba(0,0,0,0.4);
    line-height: 1.6;
    flex: 1;
    word-break: break-word;
  }

  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,10,20,0.88);
    z-index: 10;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .overlay.show { display: flex; }

  .card {
    background: var(--card);
    color: var(--ink);
    border: 5px solid var(--ink);
    box-shadow: 8px 8px 0 var(--accent2);
    max-width: 440px;
    width: 100%;
    max-height: 88dvh;
    overflow-y: auto;
    padding: 18px;
    position: relative;
    animation: pop 0.25s ease;
  }

  @keyframes pop {
    from { transform: scale(0.7); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .card-emoji {
    font-size: clamp(24px, 6vw, 30px);
    margin-bottom: 8px;
  }

  .card img {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    display: block;
    border: 3px solid var(--ink);
    margin-bottom: 14px;
    background: #ddd;
  }

  .card p {
    font-size: clamp(16px, 3.5vw, 21px);
    line-height: 1.45;
    margin: 0 0 16px;
  }

  .close-btn {
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(8px, 2.5vw, 10px);
    background: var(--ink);
    color: var(--card);
    border: none;
    padding: 10px 14px;
    cursor: pointer;
    width: 100%;
  }

  .close-btn:hover { background: var(--accent2); }

  .signature-logo {
    display: flex;
    justify-content: center;
    margin: -20px 0 40px;
    cursor: pointer;
    position: relative;
    animation: logoPulse 2s infinite;
  }
  
  .signature-logo::before {
    content: "CLICK ME";
    position: absolute;
    top: -20px;
    font-family: 'Press Start 2P', cursive;
    font-size: 8px;
    color: var(--accent);
    animation: clickMeBlink 1.5s steps(2, start) infinite;
    pointer-events: none;
  }

  @keyframes clickMeBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  .signature-logo img {
    width: 64px;
    height: auto;
    opacity: 0.55;
    transition: opacity 0.2s, transform 0.2s;
  }
  
  .signature-logo:hover img {
    opacity: 1;
    transform: scale(1.1);
  }

  @keyframes logoPulse {
    0%, 100% { transform: scale(1) translateY(0); }
    50% { transform: scale(1.05) translateY(-3px); }
  }

  .final-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 20% 30%, #29366f 0%, transparent 45%),
      radial-gradient(circle at 80% 70%, #29366f 0%, transparent 45%);
    z-index: 20;
    overflow-y: auto;
    padding: clamp(30px, 5vw, 50px) 20px 40px;
  }

  .final-overlay.show { display: block; }

  .final-card {
    max-width: 560px;
    margin: 0 auto;
    text-align: center;
    animation: finalFade 1.1s ease;
  }

  @keyframes finalFade {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .final-title {
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(14px, 4vw, 18px);
    color: var(--accent);
    text-shadow: 3px 3px 0 var(--accent2);
    margin-bottom: 24px;
    letter-spacing: 1px;
    line-height: 1.6;
  }

  .final-text {
    font-size: clamp(16px, 3.5vw, 23px);
    line-height: 1.6;
    color: var(--card);
    white-space: pre-line;
    background: var(--bg2);
    border: 4px solid var(--card);
    padding: 24px;
    box-shadow: 6px 6px 0 rgba(0,0,0,0.4);
  }

  .final-back {
    margin-top: 26px;
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(8px, 2.5vw, 10px);
    background: var(--accent);
    color: var(--ink);
    border: none;
    padding: 12px 16px;
    cursor: pointer;
  }

  .final-back:hover { background: var(--accent2); }

  .preloader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 10% 20%, #29366f 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, #29366f 0%, transparent 40%);
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .preloader.hidden {
    display: none;
  }

  .preloader-content {
    text-align: center;
  }

  .preloader-title {
    font-family: 'Press Start 2P', cursive;
    font-size: clamp(16px, 4vw, 24px);
    color: var(--accent);
    text-shadow: 2px 2px 0 var(--accent2);
    margin-bottom: 30px;
    letter-spacing: 1px;
  }

  .pixel-progress {
    width: clamp(200px, 80vw, 300px);
    height: 20px;
    background: var(--bg2);
    border: 3px solid var(--card);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
  }

  .pixel-progress-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--c1), var(--c2), var(--c3), var(--c4));
    transition: width 0.2s ease;
  }

  .preloader-text {
    font-family: 'VT323', monospace;
    font-size: clamp(12px, 3vw, 16px);
    color: #a8b5e0;
    margin-top: 15px;
    letter-spacing: 2px;
  }
</style>
</head>

<script>
// PRELOADER
const preloader = {
  init() {
    let loaded = 0;
    const imgs = document.querySelectorAll('img');
    const total = imgs.length || 1;
    const bar = document.getElementById('progressBar');
    const dots = document.getElementById('dots');
    let dotCount = 0;

    const dotInterval = setInterval(() => {
      dotCount = (dotCount + 1) % 4;
      dots.textContent = '.'.repeat(dotCount);
    }, 400);

    const check = () => {
      loaded++;
      bar.style.width = Math.min((loaded / total) * 100, 95) + '%';
      if (loaded >= total) {
        clearInterval(dotInterval);
        bar.style.width = '100%';
        setTimeout(() => document.getElementById('preloader').classList.add('hidden'), 300);
      }
    };

    imgs.forEach(img => {
      if (img.complete) check();
      else img.addEventListener('load', check);
    });

    window.addEventListener('load', check);
    setTimeout(check, 2000);
  }
};

let openedChests = new Set();
const map = document.getElementById('map');
const pathLine = document.getElementById('pathLine');
const walkerFigure = document.getElementById('walkerFigure');

function getPathLength() {
  return pathLine.getTotalLength();
}

function getPointOnPath(distance) {
  const pathLength = getPathLength();
  const norm = Math.max(0, Math.min(distance, pathLength));
  return pathLine.getPointAtLength(norm);
}

function updateCharacterPosition() {
  const mapRect = map.getBoundingClientRect();
  const scrollY = window.scrollY || window.pageYOffset;
  const mapTop = map.getBoundingClientRect().top + scrollY;
  const distFromMap = scrollY - mapTop + window.innerHeight * 0.5;
  
  const point = getPointOnPath(distFromMap);
  const scale = mapRect.width / 700;
  const x = point.x * scale - walkerFigure.offsetWidth / 2;
  const y = point.y * scale - walkerFigure.offsetHeight;
  
  walkerFigure.style.left = x + 'px';
  walkerFigure.style.top = y + 'px';
  
  const next = getPointOnPath(distFromMap + 10);
  walkerFigure.classList.toggle('facing-left', next.x < point.x);
}

let ticking = false;
window.addEventListener('scroll', () => {
  if (!ticking) {
    requestAnimationFrame(() => {
      updateCharacterPosition();
      ticking = false;
    });
    ticking = true;
  }
});

function createMemoryNodes() {
  memories.forEach((mem, i) => {
    const node = document.createElement('div');
    node.className = 'node';
    node.innerHTML = `
      <div class="chest" onclick="openCard(${mem.id})">
        <span class="num">${i + 1}</span>${mem.emoji}
      </div>
      <div class="label">${mem.text}</div>
    `;
    map.appendChild(node);
  });
}

function openCard(id) {
  const mem = memories.find(m => m.id === id);
  if (!mem) return;
  document.getElementById('cardEmoji').textContent = mem.emoji;
  document.getElementById('cardImg').src = mem.img;
  document.getElementById('cardText').textContent = mem.text;
  document.getElementById('overlay').classList.add('show');
  const chest = document.querySelector(`[onclick="openCard(${id})"]`);
  if (chest) {
    chest.classList.add('opened');
    openedChests.add(id);
    updateProgress();
  }
}

function closeCard() {
  document.getElementById('overlay').classList.remove('show');
}

function updateProgress() {
  const prog = (openedChests.size / memories.length) * 100;
  document.getElementById('progressCount').textContent = openedChests.size;
  document.getElementById('progressFill').style.width = prog + '%';
  if (openedChests.size === memories.length) {
    document.getElementById('finalText').textContent = "You unlocked all memories.\nHere's to 19 and beyond.\nI'm grateful for you every day.\nHappy Birthday.";
    document.getElementById('finalOverlay').classList.add('show');
  }
}

function closeFinal() {
  document.getElementById('finalOverlay').classList.remove('show');
}

createMemoryNodes();
preloader.init();
setTimeout(() => updateCharacterPosition(), 100);
window.addEventListener('resize', updateCharacterPosition);
</script>
